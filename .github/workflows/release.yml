name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build extension
        run: npm run build

      - name: Zip dist folder
        run: |
          cd dist
          zip -r ../ai-context-bridge-${{ github.ref_name }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-context-bridge-${{ github.ref_name }}.zip
          body: |
            ## AI Context Bridge ${{ github.ref_name }}

            ### Installation
            1. Download `ai-context-bridge-${{ github.ref_name }}.zip`
            2. Unzip the file
            3. Open Chrome and go to `chrome://extensions/`
            4. Enable **Developer mode** (top right)
            5. Click **Load unpacked** and select the unzipped folder

            ### What's Changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
